<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurora Kudos — UI Kit preview</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--aurora-black);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  @keyframes aurora-pulse{0%,100%{opacity:1}50%{opacity:.4}}
  main,header,footer{position:relative;z-index:2}
  .logo-inline img{height:40px;display:block}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>window.useState = React.useState; window.useEffect = React.useEffect;</script>
<script type="text/babel">
const { useState, useEffect } = React;
</script>
<script type="text/babel" src="Backdrop.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Leaderboard.jsx"></script>
<script type="text/babel" src="Tasks.jsx"></script>
<script type="text/babel" src="FinalCTA.jsx"></script>
<script type="text/babel">
function App(){
  const [joined, setJoined] = useState(false);
  return (
    <>
      <Backdrop />
      <PromoBanner onClick={e=>{e.preventDefault();setJoined(true);}} />
      <header><Nav active="Kudos" onCTA={()=>setJoined(true)} /></header>
      <main>
        <Hero onCTA={e=>{e.preventDefault();setJoined(true);}} />
        <Leaderboard />
        <Tasks />
        <FinalCTA onJoin={e=>{e.preventDefault();setJoined(true);}} />
      </main>
      <Footer />
      {joined && (
        <div onClick={()=>setJoined(false)} style={{position:"fixed",inset:0,background:"rgba(16,24,32,.8)",backdropFilter:"blur(8px)",zIndex:100,display:"grid",placeItems:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{maxWidth:440,padding:"40px 32px",background:"var(--bg-panel)",border:"1px solid var(--line-2)",borderRadius:20,textAlign:"center"}}>
            <div style={{width:60,height:60,margin:"0 auto 16px",borderRadius:"50%",background:"var(--aurora-green)",display:"grid",placeItems:"center",boxShadow:"0 0 40px rgba(93,235,90,.45)"}}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#101820" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>
            </div>
            <h3 style={{fontSize:24,letterSpacing:"-.02em",margin:"0 0 8px"}}>You're in.</h3>
            <p style={{color:"var(--fg-muted)",margin:"0 0 20px",fontSize:15}}>Check Discord — a mod will DM you shortly to get you set up.</p>
            <button onClick={()=>setJoined(false)} style={{background:"transparent",border:"1px solid var(--line-2)",color:"var(--fg)",padding:"10px 18px",borderRadius:8,fontWeight:600,cursor:"pointer"}}>Close</button>
          </div>
        </div>
      )}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
