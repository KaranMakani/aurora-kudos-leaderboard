<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--aurora-black);padding:32px;color:var(--fg);font-family:var(--font-sans)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .cta{display:inline-flex;align-items:center;gap:10px;padding:14px 20px;border-radius:10px;font-weight:700;font-size:14px;background:var(--aurora-green);color:var(--aurora-black);border:1px solid var(--aurora-green);letter-spacing:-.005em}
  .cta:hover{box-shadow:0 10px 32px -8px rgba(93,235,90,.55)}
  .ghost{background:#fff;color:var(--aurora-black);font-weight:700;font-size:13px;padding:10px 16px;border-radius:8px;border:0}
  .outline{background:transparent;color:#fff;border:1px solid var(--line-2);padding:12px 18px;border-radius:8px;font-weight:600;font-size:13px}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(21,30,39,.6);font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;color:var(--fg-muted);text-transform:uppercase}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--aurora-green);box-shadow:0 0 10px var(--aurora-green)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-dim);letter-spacing:.14em;text-transform:uppercase;margin-right:10px;width:90px;display:inline-block}
</style>
</head>
<body>
<div class="row"><span class="lbl">Primary</span><button class="cta">Join the fun <span>↗</span></button></div>
<div class="row"><span class="lbl">Nav</span><button class="ghost">Get started</button><button class="outline">Secondary</button></div>
<div class="row"><span class="lbl">Eyebrow</span><span class="pill"><span class="dot"></span>Community rewards · live now</span></div>
</body>
</html>
