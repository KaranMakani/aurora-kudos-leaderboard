<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--aurora-black);padding:32px;color:var(--fg);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
  .card{background:var(--bg-panel);border:1px solid var(--line);border-radius:12px;padding:22px;height:90px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--fg-muted)}
  .glow{background:var(--aurora-green);color:var(--aurora-black);font-weight:700;border:1px solid var(--aurora-green);box-shadow:0 10px 32px -8px rgba(93,235,90,.55)}
  .grad{background:linear-gradient(180deg, rgba(21,30,39,.85), rgba(18,56,62,.35));border:1px solid var(--line);backdrop-filter:blur(8px)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-dim);letter-spacing:.14em;text-transform:uppercase;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="grid">
  <div>
    <div class="card">Hairline + flat panel</div>
    <div class="lbl">Default panel</div>
  </div>
  <div>
    <div class="card grad">Gradient panel · blur(8px)</div>
    <div class="lbl">Elevated panel</div>
  </div>
  <div>
    <div class="card glow">CTA w/ green glow</div>
    <div class="lbl">Accent glow</div>
  </div>
</div>
</body>
</html>
