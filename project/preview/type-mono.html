<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--aurora-black);padding:24px;color:var(--fg);font-family:var(--font-sans)}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .block{border:1px solid var(--line);border-radius:12px;padding:16px;background:var(--bg-panel)}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;color:var(--fg-dim);text-transform:uppercase;margin-bottom:10px}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:#FF3EA5;text-transform:uppercase}
  .tag{display:inline-block;font-family:var(--font-mono);font-size:12px;padding:3px 8px;border:1px solid var(--line);border-radius:6px;color:var(--fg-muted);margin-right:6px}
  .pts{font-family:var(--font-mono);font-size:20px;font-weight:700}
  .pts small{color:var(--fg-dim);font-weight:400;font-size:12px;margin-left:4px}
  .ts{font-family:var(--font-mono);font-size:12px;color:var(--fg-dim)}
  .rank{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--aurora-green);color:var(--aurora-black);font-family:var(--font-mono);font-weight:700;font-size:13px;box-shadow:var(--shadow-glow);margin-right:8px}
</style>
</head>
<body>
<div class="grid">
  <div class="block">
    <div class="lbl">Eyebrow</div>
    <span class="eyebrow">02 · Leaderboard</span>
  </div>
  <div class="block">
    <div class="lbl">Channel tags</div>
    <span class="tag">#help</span><span class="tag">#showcase</span><span class="tag">#events</span>
  </div>
  <div class="block">
    <div class="lbl">Numeric / points</div>
    <span class="rank">1</span><span class="pts">1,740<small>AURKu</small></span>
  </div>
  <div class="block">
    <div class="lbl">Timestamps / meta</div>
    <span class="ts">Last update · just now · 08d 14h 22m</span>
  </div>
</div>
</body>
</html>
