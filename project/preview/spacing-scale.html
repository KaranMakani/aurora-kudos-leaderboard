<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--aurora-black);padding:24px;color:var(--fg);font-family:var(--font-sans)}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .bar{background:var(--aurora-green);height:14px;border-radius:3px}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--fg-dim);width:80px;text-transform:uppercase}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
</style>
</head>
<body>
<div class="row"><span class="lbl">s-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
<div class="row"><span class="lbl">s-2</span><div class="bar" style="width:8px"></div><span class="val">8px · base unit</span></div>
<div class="row"><span class="lbl">s-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
<div class="row"><span class="lbl">s-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
<div class="row"><span class="lbl">s-5</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
<div class="row"><span class="lbl">s-6</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
<div class="row"><span class="lbl">s-7</span><div class="bar" style="width:40px"></div><span class="val">40px</span></div>
<div class="row"><span class="lbl">s-8</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
<div class="row"><span class="lbl">s-9</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
<div class="row"><span class="lbl">s-10</span><div class="bar" style="width:96px"></div><span class="val">96px · section v‑padding</span></div>
</body>
</html>
