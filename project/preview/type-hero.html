<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--aurora-black);padding:24px;color:var(--fg)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(600px 300px at 85% 0%, rgba(93,235,90,.12), transparent 60%),radial-gradient(800px 400px at 0% 100%, rgba(18,56,62,.55), transparent 60%)}
  .wrap{position:relative;z-index:1}
  .hero{font-family:var(--font-display);font-weight:700;font-size:72px;line-height:.98;letter-spacing:-.035em;background:var(--headline-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0}
  .sub{font-family:var(--font-sans);font-size:16px;color:var(--fg-2);margin-top:12px;max-width:520px;line-height:1.55}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:#FF3EA5;text-transform:uppercase;margin-bottom:16px;display:block}
</style>
</head>
<body>
<div class="wrap">
  <span class="eyebrow">01 · Hero specimen</span>
  <h1 class="hero">Earn Kudos.<br>Get rewarded.</h1>
  <p class="sub">Manrope 700 · 72px · –0.035em tracking · headline gradient applied via background‑clip. Reserve this treatment for heroes + section titles only.</p>
</div>
</body>
</html>
