<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--aurora-black);padding:24px;font-family:var(--font-sans);color:var(--fg)}
  .swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--bg-panel)}
  .sw .chip{height:72px}
  .sw .meta{padding:10px 12px;font-size:12px}
  .sw .name{font-weight:700;font-size:13px;letter-spacing:-.005em;margin-bottom:2px}
  .sw .hex{font-family:var(--font-mono);color:var(--fg-dim);font-size:11px}
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#101820"></div><div class="meta"><div class="name">Aurora Black</div><div class="hex">#101820</div></div></div>
  <div class="sw"><div class="chip" style="background:#151E27"></div><div class="meta"><div class="name">Cloud Black</div><div class="hex">#151E27</div></div></div>
  <div class="sw"><div class="chip" style="background:#12383E"></div><div class="meta"><div class="name">Dark Green</div><div class="hex">#12383E</div></div></div>
  <div class="sw"><div class="chip" style="background:#5DEB5A"></div><div class="meta"><div class="name" style="color:var(--aurora-black)">—</div><div class="name">Aurora Green</div><div class="hex">#5DEB5A</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
</div>
</body>
</html>
